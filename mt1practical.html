<!--To develop a web page that dynamically changes content using javascript events and DOM manipulation-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM Manipulation Example</title>
    <link rel="stylesheet" href="mt1practical.css">
</head>
<body>

    <div class="container">
        <h1 id="title">Welcome!</h1>

        <p id="text">Click the button to change this content.</p>

        <button id="changeTextBtn">Change Text</button>
        <button id="changeColorBtn">Change Color</button>
        <button id="addItemBtn">Add Item</button>

        <ul id="list"></ul>
    </div>

    <script src=".\mt1practical.js"></script>
</body>
</html>
