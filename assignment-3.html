<body>
    <script>
        var a = 100; var b = 13; var c = 10; var linebreak = "<br>";

        document.write(result);

        document.write("a - b = ");

        document.write(result);

        document.write("a / b = ");
        result = a / b;
        document.write(result);

        result = a % b;
        document.write(result);
